<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/templates.css}" href="/css/templates.css">
    <title th:text="'Import Result - ' + ${entityTitle}">Import Result</title>
    <style>
        .container { max-width: 1180px; margin: 22px auto; padding: 0 16px; }
        .alert { border-radius: 6px; padding: 12px 14px; margin: 12px 0; }
        .alert-warn { background: #fff8c5; border: 1px solid #d4a72c; color: #7d4e00; }
        .table-wrap { overflow-x: auto; border: 1px solid #d0d7de; border-radius: 8px; margin-top: 10px; }
        table { border-collapse: collapse; width: 100%; min-width: 900px; }
        th, td { border: 1px solid #d0d7de; padding: 6px; font-size: 0.92rem; vertical-align: top; }
        th { background: #f6f8fa; text-align: left; }
        .error-cell { color: #a40e26; font-weight: 600; min-width: 220px; }
        .actions { margin-top: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h1 th:text="'Bulk Import Result - ' + ${entityTitle}">Bulk Import Result</h1>

    <div class="alert alert-warn" th:if="${importWarning}" th:text="${importWarning}"></div>

    <div class="actions">
        <a th:href="@{/import/{e}(e=${entityPath})}">Try Again</a>
        |
        <a th:href="${listPath}">Go to List</a>
        |
        <a th:href="@{/}">Home</a>
    </div>

    <div class="table-wrap" th:if="${importRows}">
        <table>
            <thead>
            <tr>
                <th>Row</th>
                <th th:each="col : ${columns}" th:text="${col}">Column</th>
                <th>Error</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row : ${importRows}" th:if="${!row.valid}">
                <td th:text="${row.rowNumber}">2</td>
                <td th:each="col : ${columns}" th:text="${row.data[col]}"></td>
                <td class="error-cell" th:text="${row.error}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
