<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/templates.css}" href="/css/templates.css">
    <title>Bonds</title>
</head>
<body>
<h1>Bonds</h1>
<p>
    <a th:href="@{/bonds/new}">Create Bond</a>
    |
    <a th:href="@{/bonds/export(format='csv',issuer=${selectedIssuer},bondType=${selectedBondType},tradingStatus=${selectedTradingStatus},currency=${selectedCurrency})}">Export CSV</a>
    |
    <a th:href="@{/bonds/export(format='excel',issuer=${selectedIssuer},bondType=${selectedBondType},tradingStatus=${selectedTradingStatus},currency=${selectedCurrency})}">Export Excel</a>
    |
    <a th:href="@{/import/bonds}">Import</a>
    |
    <a th:href="@{/}">Back to Home</a>
</p>

<form th:action="@{/bonds}" method="get" style="margin-bottom: 12px;">
    <label for="issuer">Issuer</label>
    <input id="issuer" name="issuer" type="text" th:value="${selectedIssuer}" maxlength="255">

    <label for="bondType">Bond Type</label>
    <select id="bondType" name="bondType">
        <option value="">All</option>
        <option th:each="value : ${bondTypes}" th:value="${value}" th:text="${value}" th:selected="${selectedBondType == value}">CORPORATE</option>
    </select>

    <label for="tradingStatus">Trading Status</label>
    <select id="tradingStatus" name="tradingStatus">
        <option value="">All</option>
        <option th:each="value : ${tradingStatuses}" th:value="${value}" th:text="${value}" th:selected="${selectedTradingStatus == value}">ACTIVE</option>
    </select>

    <label for="currency">Currency</label>
    <input id="currency" name="currency" type="text" th:value="${selectedCurrency}" maxlength="3">

    <button type="submit">Filter</button>
    <a th:href="@{/bonds}">Reset</a>
</form>

<table style="border-collapse: collapse; width: 100%;">
    <thead>
    <tr>
        <th style="border: 1px solid #ccc; padding: 6px;">Bond ID</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Title</th>
        <th style="border: 1px solid #ccc; padding: 6px;">ISIN</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Issuer</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Type</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Currency</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Maturity</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Trading Status</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Risk Score</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(bonds)}">
        <td colspan="10" style="border: 1px solid #ccc; padding: 6px;">No bonds found.</td>
    </tr>
    <tr th:each="bond : ${bonds}">
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${bond.bondId}">BOND-001</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${bond.title}">Romania Government Bond 2032</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${bond.isin}">RO1234567890</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${bond.issuer}">Romania</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${bond.bondType}">GOVERNMENT</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${bond.currency}">EUR</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${bond.maturityDate}">2032-12-31</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${bond.tradingStatus}">ACTIVE</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${bond.riskScore}">72.5</td>
        <td style="border: 1px solid #ccc; padding: 6px;">
            <a th:href="@{/bonds/{id}(id=${bond.id})}">View</a>
            |
            <a th:href="@{/bonds/{id}/edit(id=${bond.id})}">Edit</a>
            |
            <form th:action="@{/bonds/{id}/delete(id=${bond.id})}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
