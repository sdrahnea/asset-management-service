<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bank Accounts</title>
</head>
<body>
<h1>Bank Accounts</h1>
<p>
    <a th:href="@{/bank-accounts/new}">Create Bank Account</a>
    |
    <a th:href="@{/}">Back to Home</a>
</p>
<table style="border-collapse: collapse; width: 100%;">
    <thead>
    <tr>
        <th style="border: 1px solid #ccc; padding: 6px;">Name</th>
        <th style="border: 1px solid #ccc; padding: 6px;">IBAN (Masked)</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Bank Name</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Account Type</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Currency</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Status</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Ownership Type</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Opened At</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(bankAccounts)}">
        <td colspan="9" style="border: 1px solid #ccc; padding: 6px;">No bank accounts found.</td>
    </tr>
    <tr th:each="account : ${bankAccounts}">
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${account.name}">Operating Account</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${account.maskedIban}">****************1234</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${account.bankName}">Bank Name</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${account.accountType}">CURRENT</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${account.currency}">EUR</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${account.status}">ACTIVE</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${account.ownershipType}">INDIVIDUAL</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${account.openedAt}">2026-01-01</td>
        <td style="border: 1px solid #ccc; padding: 6px;">
            <a th:href="@{/bank-accounts/{id}(id=${account.id})}">View</a>
            |
            <a th:href="@{/bank-accounts/{id}/edit(id=${account.id})}">Edit</a>
            |
            <form th:action="@{/bank-accounts/{id}/delete(id=${account.id})}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
