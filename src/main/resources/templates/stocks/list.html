<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/templates.css}" href="/css/templates.css">
    <title>Stocks</title>
</head>
<body>
<h1>Stocks</h1>
<p>
    <a th:href="@{/stocks/new}">Create Stock</a>
    |
    <a th:href="@{/stocks/export(format='csv',tickerSymbol=${selectedTickerSymbol},exchange=${selectedExchange},sector=${selectedSector},companyType=${selectedCompanyType})}">Export CSV</a>
    |
    <a th:href="@{/stocks/export(format='excel',tickerSymbol=${selectedTickerSymbol},exchange=${selectedExchange},sector=${selectedSector},companyType=${selectedCompanyType})}">Export Excel</a>
    |
    <a th:href="@{/import/stocks}">Import</a>
    |
    <a th:href="@{/}">Back to Home</a>
</p>

<form th:action="@{/stocks}" method="get" style="margin-bottom: 12px;">
    <label for="tickerSymbol">Ticker</label>
    <input id="tickerSymbol" name="tickerSymbol" type="text" th:value="${selectedTickerSymbol}" maxlength="20">

    <label for="exchange">Exchange</label>
    <input id="exchange" name="exchange" type="text" th:value="${selectedExchange}" maxlength="30">

    <label for="sector">Sector</label>
    <input id="sector" name="sector" type="text" th:value="${selectedSector}" maxlength="120">

    <label for="companyType">Company Type</label>
    <select id="companyType" name="companyType">
        <option value="">All</option>
        <option th:each="value : ${companyTypes}" th:value="${value}" th:text="${value}" th:selected="${selectedCompanyType == value}">PUBLIC</option>
    </select>

    <button type="submit">Filter</button>
    <a th:href="@{/stocks}">Reset</a>
</form>

<table style="border-collapse: collapse; width: 100%;">
    <thead>
    <tr>
        <th style="border: 1px solid #ccc; padding: 6px;">Stock ID</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Ticker</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Exchange</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Company</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Sector</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Current Price</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Market Cap</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Assessment</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(stocks)}">
        <td colspan="9" style="border: 1px solid #ccc; padding: 6px;">No stocks found.</td>
    </tr>
    <tr th:each="stock : ${stocks}">
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${stock.stockId}">STK-001</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${stock.tickerSymbol}">AAPL</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${stock.exchange}">NASDAQ</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${stock.companyName}">Apple Inc.</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${stock.sector}">Technology</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${stock.currentPrice}">150.00</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${stock.marketCap}">2000000000</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${stock.overallAssessmentScore}">85</td>
        <td style="border: 1px solid #ccc; padding: 6px;">
            <a th:href="@{/stocks/{id}(id=${stock.id})}">View</a>
            |
            <a th:href="@{/stocks/{id}/edit(id=${stock.id})}">Edit</a>
            |
            <form th:action="@{/stocks/{id}/delete(id=${stock.id})}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
