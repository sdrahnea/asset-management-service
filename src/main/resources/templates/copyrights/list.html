<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pluralTitle}">Assets</title>
</head>
<body>
<h1 th:text="${pluralTitle}">Assets</h1>

<p>
    <a th:href="@{|${basePath}/new|}" th:text="${'Create ' + singularTitle}">Create</a>
    |
    <a th:href="@{/}">Back to Home</a>
</p>

<table style="border-collapse: collapse; width: 100%;">
    <thead>
    <tr>
        <th style="border: 1px solid #ccc; padding: 6px;">ID</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Copyright ID</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Title</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Work Type</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Owner(s)</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Status</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Registration #</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Country</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(items)}">
        <td colspan="9" style="border: 1px solid #ccc; padding: 6px;">No records found.</td>
    </tr>
    <tr th:each="item : ${items}">
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.id}">1</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.copyrightId}">CR-001</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.title}">Work title</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.workType}">SOFTWARE</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.copyrightOwners}">Owner</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.copyrightStatus}">ACTIVE</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.registrationNumber}">REG-001</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.countryOfOrigin}">RO</td>
        <td style="border: 1px solid #ccc; padding: 6px;">
            <a th:href="@{|${basePath}/${item.id}/edit|}">Edit</a>
            <form th:action="@{|${basePath}/${item.id}/delete|}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
