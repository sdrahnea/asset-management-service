<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/templates.css}" href="/css/templates.css">
    <title>Reputations</title>
</head>
<body>
<h1>Reputations</h1>
<p>
    <a th:href="@{/reputations/new}">Create Reputation</a>
    |
    <a th:href="@{/reputations/export(format='csv',entityId=${selectedEntityId},entityType=${selectedEntityType},trendDirection=${selectedTrendDirection},competitivePosition=${selectedCompetitivePosition})}">Export CSV</a>
    |
    <a th:href="@{/reputations/export(format='excel',entityId=${selectedEntityId},entityType=${selectedEntityType},trendDirection=${selectedTrendDirection},competitivePosition=${selectedCompetitivePosition})}">Export Excel</a>
    |
    <a th:href="@{/import/reputations}">Import</a>
    |
    <a th:href="@{/}">Back to Home</a>
</p>

<form th:action="@{/reputations}" method="get" style="margin-bottom: 12px;">
    <label for="entityId">Entity ID</label>
    <input id="entityId" name="entityId" type="text" th:value="${selectedEntityId}" maxlength="100">

    <label for="entityType">Entity Type</label>
    <select id="entityType" name="entityType">
        <option value="">All</option>
        <option th:each="v : ${entityTypes}" th:value="${v}" th:text="${v}" th:selected="${selectedEntityType == v}">COMPANY</option>
    </select>

    <label for="trendDirection">Trend</label>
    <select id="trendDirection" name="trendDirection">
        <option value="">All</option>
        <option th:each="v : ${trendDirections}" th:value="${v}" th:text="${v}" th:selected="${selectedTrendDirection == v}">STABLE</option>
    </select>

    <label for="competitivePosition">Position</label>
    <select id="competitivePosition" name="competitivePosition">
        <option value="">All</option>
        <option th:each="v : ${competitivePositions}" th:value="${v}" th:text="${v}" th:selected="${selectedCompetitivePosition == v}">CHALLENGER</option>
    </select>

    <button type="submit">Filter</button>
    <a th:href="@{/reputations}">Reset</a>
</form>

<table style="border-collapse: collapse; width: 100%;">
    <thead>
    <tr>
        <th style="border: 1px solid #ccc; padding: 6px;">Reputation ID</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Entity Type</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Entity ID</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Display Name</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Reputation Score</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Risk Score</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Trend</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(reputations)}">
        <td colspan="8" style="border: 1px solid #ccc; padding: 6px;">No reputations found.</td>
    </tr>
    <tr th:each="reputation : ${reputations}">
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${reputation.reputationId}">REP-001</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${reputation.entityType}">COMPANY</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${reputation.entityId}">ENT-001</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${reputation.displayName}">Acme Corp</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${reputation.reputationScore}">72</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${reputation.riskScore}">25</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${reputation.trendDirection}">IMPROVING</td>
        <td style="border: 1px solid #ccc; padding: 6px;">
            <a th:href="@{/reputations/{id}(id=${reputation.id})}">View</a>
            |
            <a th:href="@{/reputations/{id}/edit(id=${reputation.id})}">Edit</a>
            |
            <form th:action="@{/reputations/{id}/delete(id=${reputation.id})}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
