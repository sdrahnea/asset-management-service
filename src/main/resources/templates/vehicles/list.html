<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/templates.css}" href="/css/templates.css">
    <title>Vehicles</title>
</head>
<body>
<h1>Vehicles</h1>
<p>
    <a th:href="@{/vehicles/new}">Create Vehicle</a>
    |
    <a th:href="@{/vehicles/export(format='csv',vehicleType=${selectedVehicleType},registrationStatus=${selectedRegistrationStatus},ownershipType=${selectedOwnershipType})}">Export CSV</a>
    |
    <a th:href="@{/vehicles/export(format='excel',vehicleType=${selectedVehicleType},registrationStatus=${selectedRegistrationStatus},ownershipType=${selectedOwnershipType})}">Export Excel</a>
    |
    <a th:href="@{/}">Back to Home</a>
</p>

<form th:action="@{/vehicles}" method="get" style="margin-bottom: 12px;">
    <label for="vehicleType">Type</label>
    <select id="vehicleType" name="vehicleType">
        <option value="">All</option>
        <option th:each="value : ${vehicleTypes}" th:value="${value}" th:text="${value}" th:selected="${selectedVehicleType == value}">CAR</option>
    </select>

    <label for="registrationStatus">Registration</label>
    <select id="registrationStatus" name="registrationStatus">
        <option value="">All</option>
        <option th:each="value : ${registrationStatuses}" th:value="${value}" th:text="${value}" th:selected="${selectedRegistrationStatus == value}">ACTIVE</option>
    </select>

    <label for="ownershipType">Ownership</label>
    <select id="ownershipType" name="ownershipType">
        <option value="">All</option>
        <option th:each="value : ${ownershipTypes}" th:value="${value}" th:text="${value}" th:selected="${selectedOwnershipType == value}">COMPANY</option>
    </select>

    <button type="submit">Filter</button>
    <a th:href="@{/vehicles}">Reset</a>
</form>

<table style="border-collapse: collapse; width: 100%;">
    <thead>
    <tr>
        <th style="border: 1px solid #ccc; padding: 6px;">Vehicle ID</th>
        <th style="border: 1px solid #ccc; padding: 6px;">VIN</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Plate</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Type</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Make / Model</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Reg. Status</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Market Value</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Valuation Date</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(vehicles)}">
        <td colspan="9" style="border: 1px solid #ccc; padding: 6px;">No vehicles found.</td>
    </tr>
    <tr th:each="vehicle : ${vehicles}">
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${vehicle.vehicleId}">VH-001</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${vehicle.vin}">WBAAA000000000000</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${vehicle.licensePlate}">B123XYZ</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${vehicle.vehicleType}">CAR</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${vehicle.make + ' ' + vehicle.model}">BMW X5</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${vehicle.registrationStatus}">ACTIVE</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${vehicle.currentMarketValue}">10000</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${vehicle.valuationDate}">2026-01-01</td>
        <td style="border: 1px solid #ccc; padding: 6px;">
            <a th:href="@{/vehicles/{id}(id=${vehicle.id})}">View</a>
            |
            <a th:href="@{/vehicles/{id}/edit(id=${vehicle.id})}">Edit</a>
            |
            <form th:action="@{/vehicles/{id}/delete(id=${vehicle.id})}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
