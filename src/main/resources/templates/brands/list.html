<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/templates.css}" href="/css/templates.css">
    <title th:text="${pluralTitle}">Assets</title>
</head>
<body>
<h1 th:text="${pluralTitle}">Assets</h1>

<p>
    <a th:href="@{|${basePath}/new|}" th:text="${'Create ' + singularTitle}">Create</a>
    |
    <a th:href="@{/}">Back to Home</a>
</p>

<table style="border-collapse: collapse; width: 100%;">
    <thead>
    <tr>
        <th style="border: 1px solid #ccc; padding: 6px;">ID</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Brand ID</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Brand Name</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Category</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Owner</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Country</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Status</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Trademark #</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(items)}">
        <td colspan="9" style="border: 1px solid #ccc; padding: 6px;">No records found.</td>
    </tr>
    <tr th:each="item : ${items}">
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.id}">1</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.brandId}">BR-001</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.brandName}">Brand Name</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.brandCategory}">Category</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.parentCompanyOwner}">Owner</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.countryOfOrigin}">RO</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.status}">ACTIVE</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.trademarkRegistrationNumber}">TM-001</td>
        <td style="border: 1px solid #ccc; padding: 6px;">
            <a th:href="@{|${basePath}/${item.id}/edit|}">Edit</a>
            <form th:action="@{|${basePath}/${item.id}/delete|}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
