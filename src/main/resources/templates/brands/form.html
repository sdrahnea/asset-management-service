<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit ? 'Edit ' + singularTitle : 'Create ' + singularTitle}">Entity Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-section { border: 1px solid #ddd; padding: 15px; margin: 20px 0; background-color: #f9f9f9; }
        .form-section h3 { margin-top: 0; color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="number"], input[type="date"], select, textarea {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        textarea { min-height: 90px; resize: vertical; }
        .readonly { background-color: #e9ecef; cursor: not-allowed; }
        button { padding: 10px 20px; }
    </style>
</head>
<body>
<h1 th:text="${isEdit ? 'Edit ' + singularTitle : 'Create ' + singularTitle}">Entity Form</h1>

<form th:action="${isEdit} ? @{|${basePath}/${item.id}|} : @{|${basePath}|}" th:object="${item}" method="post">
    <div class="form-section">
        <h3>Core Identity Information</h3>
        <div class="form-group"><label for="brandId">Brand ID *</label><input id="brandId" type="text" th:field="*{brandId}" required></div>
        <div class="form-group"><label for="brandName">Brand Name *</label><input id="brandName" type="text" th:field="*{brandName}" required></div>
        <div class="form-group"><label for="logoReference">Logo and Visual Identifier Reference</label><input id="logoReference" type="text" th:field="*{logoReference}"></div>
        <div class="form-group"><label for="taglineSlogan">Tagline / Slogan</label><input id="taglineSlogan" type="text" th:field="*{taglineSlogan}"></div>
        <div class="form-group"><label for="shortDescription">Brand Description (Short)</label><textarea id="shortDescription" th:field="*{shortDescription}"></textarea></div>
        <div class="form-group"><label for="longDescription">Brand Description (Long)</label><textarea id="longDescription" th:field="*{longDescription}"></textarea></div>
        <div class="form-group"><label for="brandCategory">Brand Category</label><input id="brandCategory" type="text" th:field="*{brandCategory}"></div>
        <div class="form-group"><label for="parentCompanyOwner">Parent Company / Owner *</label><input id="parentCompanyOwner" type="text" th:field="*{parentCompanyOwner}" required></div>
        <div class="form-group"><label for="countryOfOrigin">Country of Origin *</label><input id="countryOfOrigin" type="text" th:field="*{countryOfOrigin}" required></div>
    </div>

    <div class="form-section">
        <h3>Legal and Ownership Attributes</h3>
        <div class="form-group"><label for="trademarkRegistrationNumber">Trademark Registration Number</label><input id="trademarkRegistrationNumber" type="text" th:field="*{trademarkRegistrationNumber}"></div>
        <div class="form-group">
            <label for="trademarkType">Trademark Type</label>
            <select id="trademarkType" th:field="*{trademarkType}">
                <option value="">-- Select Trademark Type --</option>
                <option th:each="tt : ${T(com.sdr.ams.model.intangible.Brand.TrademarkType).values()}" th:value="${tt}" th:text="${tt}"></option>
            </select>
        </div>
        <div class="form-group"><label for="jurisdictionsCovered">Jurisdictions Covered</label><input id="jurisdictionsCovered" type="text" th:field="*{jurisdictionsCovered}"></div>
        <div class="form-group"><label for="registrationDate">Registration Date</label><input id="registrationDate" type="date" th:field="*{registrationDate}"></div>
        <div class="form-group"><label for="expirationDate">Expiration Date</label><input id="expirationDate" type="date" th:field="*{expirationDate}"></div>
        <div class="form-group">
            <label for="status">Status *</label>
            <select id="status" th:field="*{status}" required>
                <option value="">-- Select Status --</option>
                <option th:each="st : ${T(com.sdr.ams.model.intangible.Brand.BrandStatus).values()}" th:value="${st}" th:text="${st}"></option>
            </select>
        </div>
        <div class="form-group"><label for="associatedLegalDocuments">Associated Legal Documents (References)</label><textarea id="associatedLegalDocuments" th:field="*{associatedLegalDocuments}"></textarea></div>
    </div>

    <div class="form-section">
        <h3>Market Presence and Positioning</h3>
        <div class="form-group"><label for="industrySector">Industry / Sector</label><input id="industrySector" type="text" th:field="*{industrySector}"></div>
        <div class="form-group"><label for="targetAudience">Target Audience</label><textarea id="targetAudience" th:field="*{targetAudience}"></textarea></div>
        <div class="form-group"><label for="brandPositioningStatement">Brand Positioning Statement</label><textarea id="brandPositioningStatement" th:field="*{brandPositioningStatement}"></textarea></div>
        <div class="form-group"><label for="valueProposition">Value Proposition</label><textarea id="valueProposition" th:field="*{valueProposition}"></textarea></div>
        <div class="form-group"><label for="competitors">Competitors</label><textarea id="competitors" th:field="*{competitors}"></textarea></div>
        <div class="form-group"><label for="geographicMarketsServed">Geographic Markets Served</label><input id="geographicMarketsServed" type="text" th:field="*{geographicMarketsServed}"></div>
    </div>

    <div class="form-section">
        <h3>Performance and Perception Indicators</h3>
        <div class="form-group"><label for="brandEquityScore">Brand Equity Score</label><input id="brandEquityScore" type="number" step="0.01" th:field="*{brandEquityScore}"></div>
        <div class="form-group"><label for="brandAwareness">Brand Awareness</label><input id="brandAwareness" type="text" th:field="*{brandAwareness}"></div>
        <div class="form-group">
            <label for="brandSentiment">Brand Sentiment</label>
            <select id="brandSentiment" th:field="*{brandSentiment}">
                <option value="">-- Select Sentiment --</option>
                <option th:each="sm : ${T(com.sdr.ams.model.intangible.Brand.SentimentLevel).values()}" th:value="${sm}" th:text="${sm}"></option>
            </select>
        </div>
        <div class="form-group"><label for="marketShare">Market Share (%)</label><input id="marketShare" type="number" step="0.01" th:field="*{marketShare}"></div>
        <div class="form-group"><label for="customerLoyaltyIndicators">Customer Loyalty Indicators</label><textarea id="customerLoyaltyIndicators" th:field="*{customerLoyaltyIndicators}"></textarea></div>
        <div class="form-group"><label for="netPromoterScore">Net Promoter Score (NPS)</label><input id="netPromoterScore" type="number" th:field="*{netPromoterScore}"></div>
    </div>

    <div class="form-section">
        <h3>Digital Footprint</h3>
        <div class="form-group"><label for="officialWebsite">Official Website</label><input id="officialWebsite" type="text" th:field="*{officialWebsite}"></div>
        <div class="form-group"><label for="socialMediaAccounts">Social Media Accounts</label><textarea id="socialMediaAccounts" th:field="*{socialMediaAccounts}"></textarea></div>
        <div class="form-group"><label for="followerCounts">Follower Counts</label><textarea id="followerCounts" th:field="*{followerCounts}"></textarea></div>
        <div class="form-group"><label for="engagementMetrics">Engagement Metrics</label><textarea id="engagementMetrics" th:field="*{engagementMetrics}"></textarea></div>
        <div class="form-group"><label for="seoVisibilityIndicators">SEO Visibility Indicators</label><textarea id="seoVisibilityIndicators" th:field="*{seoVisibilityIndicators}"></textarea></div>
    </div>

    <div class="form-section">
        <h3>Operational Metadata</h3>
        <div class="form-group"><label for="assessmentHistory">Assessment History</label><textarea id="assessmentHistory" th:field="*{assessmentHistory}"></textarea></div>
        <div class="form-group"><label for="assignedAnalystReviewer">Assigned Analyst / Reviewer</label><input id="assignedAnalystReviewer" type="text" th:field="*{assignedAnalystReviewer}"></div>
        <div class="form-group"><label for="tagsClassificationLabels">Tags / Classification Labels</label><input id="tagsClassificationLabels" type="text" th:field="*{tagsClassificationLabels}"></div>
    </div>

    <div class="form-section">
        <h3>Optional Financial Attributes</h3>
        <div class="form-group"><label for="revenueAttributedToBrand">Revenue Attributed to the Brand</label><input id="revenueAttributedToBrand" type="number" step="0.01" th:field="*{revenueAttributedToBrand}"></div>
        <div class="form-group"><label for="profitabilityMetrics">Profitability Metrics</label><textarea id="profitabilityMetrics" th:field="*{profitabilityMetrics}"></textarea></div>
        <div class="form-group"><label for="licensingIncome">Licensing Income</label><input id="licensingIncome" type="number" step="0.01" th:field="*{licensingIncome}"></div>
        <div class="form-group"><label for="brandValuation">Brand Valuation</label><input id="brandValuation" type="number" step="0.01" th:field="*{brandValuation}"></div>
        <div class="form-group"><label for="costOfBrandMaintenance">Cost of Brand Maintenance</label><input id="costOfBrandMaintenance" type="number" step="0.01" th:field="*{costOfBrandMaintenance}"></div>
    </div>

    <div class="form-section">
        <h3>Audit</h3>
        <div class="form-group"><label for="createdBy">Created By</label><input id="createdBy" type="text" th:field="*{createdBy}"></div>
        <div class="form-group"><label for="updatedBy">Updated By</label><input id="updatedBy" type="text" th:field="*{updatedBy}"></div>
        <div class="form-group"><label for="createdAt">Created At</label><input id="createdAt" type="text" th:value="${item.createdAt}" class="readonly" readonly></div>
        <div class="form-group"><label for="updatedAt">Updated At</label><input id="updatedAt" type="text" th:value="${item.updatedAt}" class="readonly" readonly></div>
    </div>

    <div class="form-group">
        <button type="submit" th:text="${isEdit} ? 'Update' : 'Create'">Save</button>
        <a th:href="@{|${basePath}|}">Cancel</a>
    </div>
</form>
</body>
</html>
