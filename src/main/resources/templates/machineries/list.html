<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/templates.css}" href="/css/templates.css">
    <title th:text="${pluralTitle}">Assets</title>
</head>
<body>
<h1 th:text="${pluralTitle}">Assets</h1>

<p>
    <a th:href="@{|${basePath}/new|}" th:text="${'Create ' + singularTitle}">Create</a>
    |
    <a th:href="@{/}">Back to Home</a>
</p>

    |
    <a th:href="@{|${basePath}/export?format=csv|}">Export CSV</a>
    |
    <a th:href="@{|${basePath}/export?format=excel|}">Export Excel</a>
<table style="border-collapse: collapse; width: 100%;">
    <thead>
    <tr>
        <th style="border: 1px solid #ccc; padding: 6px;">ID</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Machine ID</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Category</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Manufacturer</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Model</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Serial Number</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Year</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Condition</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Status</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(items)}">
        <td colspan="10" style="border: 1px solid #ccc; padding: 6px;">No records found.</td>
    </tr>
    <tr th:each="item : ${items}">
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.id}">1</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.machineId}">M-001</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.category}">INDUSTRIAL</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.manufacturer}">Manufacturer</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.model}">Model</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.serialNumber}">SN-001</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.yearOfManufacture}">2020</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.conditionStatus}">GOOD</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.usageType}">OWNED</td>
        <td style="border: 1px solid #ccc; padding: 6px;">
            <a th:href="@{|${basePath}/${item.id}/edit|}">Edit</a>
            <form th:action="@{|${basePath}/${item.id}/delete|}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
