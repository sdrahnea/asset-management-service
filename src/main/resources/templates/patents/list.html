<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/templates.css}" href="/css/templates.css">
    <title>Patents</title>
</head>
<body>
<h1>Patents</h1>
<p>
    <a th:href="@{/patents/new}">Create Patent</a>
    |
    <a th:href="@{/patents/export(format='csv',patentType=${selectedPatentType},legalStatus=${selectedLegalStatus},technologyField=${selectedTechnologyField},assigneeOwner=${selectedAssigneeOwner})}">Export CSV</a>
    |
    <a th:href="@{/patents/export(format='excel',patentType=${selectedPatentType},legalStatus=${selectedLegalStatus},technologyField=${selectedTechnologyField},assigneeOwner=${selectedAssigneeOwner})}">Export Excel</a>
    |
    <a th:href="@{/import/patents}">Import</a>
    |
    <a th:href="@{/}">Back to Home</a>
</p>

<form th:action="@{/patents}" method="get" style="margin-bottom: 12px;">
    <label for="patentType">Patent Type</label>
    <select id="patentType" name="patentType">
        <option value="">All</option>
        <option th:each="v : ${patentTypes}" th:value="${v}" th:text="${v}" th:selected="${selectedPatentType == v}">UTILITY</option>
    </select>

    <label for="legalStatus">Legal Status</label>
    <select id="legalStatus" name="legalStatus">
        <option value="">All</option>
        <option th:each="v : ${legalStatuses}" th:value="${v}" th:text="${v}" th:selected="${selectedLegalStatus == v}">PENDING</option>
    </select>

    <label for="technologyField">Technology Field</label>
    <input id="technologyField" name="technologyField" type="text" th:value="${selectedTechnologyField}" maxlength="150">

    <label for="assigneeOwner">Assignee/Owner</label>
    <input id="assigneeOwner" name="assigneeOwner" type="text" th:value="${selectedAssigneeOwner}" maxlength="255">

    <button type="submit">Filter</button>
    <a th:href="@{/patents}">Reset</a>
</form>

<table style="border-collapse: collapse; width: 100%;">
    <thead>
    <tr>
        <th style="border: 1px solid #ccc; padding: 6px;">Patent ID</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Title</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Type</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Assignee</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Application #</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Application Date</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Legal Status</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Valuation</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(patents)}">
        <td colspan="9" style="border: 1px solid #ccc; padding: 6px;">No patents found.</td>
    </tr>
    <tr th:each="patent : ${patents}">
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${patent.patentId}">PAT-001</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${patent.title}">Autonomous System</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${patent.patentType}">UTILITY</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${patent.assigneeOwner}">SDR Corp</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${patent.applicationNumber}">APP-001</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${patent.applicationDate}">2026-04-01</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${patent.legalStatus}">PENDING</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${patent.valuation}">100000</td>
        <td style="border: 1px solid #ccc; padding: 6px;">
            <a th:href="@{/patents/{id}(id=${patent.id})}">View</a>
            |
            <a th:href="@{/patents/{id}/edit(id=${patent.id})}">Edit</a>
            |
            <form th:action="@{/patents/{id}/delete(id=${patent.id})}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
