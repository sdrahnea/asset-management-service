<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pluralTitle}">Assets</title>
</head>
<body>
<h1 th:text="${pluralTitle}">Assets</h1>

<p>
    <a th:href="@{|${basePath}/new|}" th:text="'Create ' + ${singularTitle}">Create</a>
    |
    <a th:href="@{/}">Back to Home</a>
</p>

<table style="border-collapse: collapse; width: 100%;">
    <thead>
    <tr>
        <th style="border: 1px solid #ccc; padding: 6px;">ID</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Name</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Created By</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Created At</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Updated By</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Updated At</th>
        <th style="border: 1px solid #ccc; padding: 6px;">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(items)}">
        <td colspan="7" style="border: 1px solid #ccc; padding: 6px;">No records found.</td>
    </tr>
    <tr th:each="item : ${items}">
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.id}">1</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.name}">Name</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.createdBy}">system</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.createdAt}">2026-01-01T00:00:00Z</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.updatedBy}">system</td>
        <td style="border: 1px solid #ccc; padding: 6px;" th:text="${item.updatedAt}">2026-01-01T00:00:00Z</td>
        <td style="border: 1px solid #ccc; padding: 6px;">
            <a th:href="@{|${basePath}/${item.id}/edit|}">Edit</a>
            <form th:action="@{|${basePath}/${item.id}/delete|}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
